<!DOCTYPE html>
<html lang="en">
<head>

    <title>calculator</title>
    <style>
          body{
            background-color: rgb(49, 176, 235);
          }
          .box
          {
             margin-top:1cm;;

        }

</head>
<body>
    <div class="box">
      <h2>
        
    <table>
      <tr><td style="background-color: white; color: lightgray;" id="expression"></td></tr>
      <tr><td><input id="result" type="text" placeholder="0"></td></tr>
    </table>
 <table> 
        <tr>
            <td ><button id="sy"  onclick="add('(')">(</button></td>

    <tr><td ><button id="num" onclick="add('1')">1 </button></td>
